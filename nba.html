<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="elaine.png" ><title>NBA 战报</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 40px 20px; color: #fff; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 30px; font-size: 2.5em; }
        .back { color: #fff; text-decoration: none; display: inline-block; margin-bottom: 20px; }
        .section { background: rgba(255,255,255,0.1); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
        .date { color: #aaa; font-size: 0.9em; margin-bottom: 16px; }
        .game { background: rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .team { font-size: 1.2em; font-weight: bold; }
        .score { font-size: 1.5em; color: #f39c12; }
        .winner { color: #2ecc71; }
        .footer { text-align: center; color: #666; margin-top: 40px; }
    </style>
</head>
